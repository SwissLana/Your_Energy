<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />

    <title>Favorites | Your Energy</title>

    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <script type="module" crossorigin src="/Your_Energy/favorites.js"></script>
    <link rel="modulepreload" crossorigin href="/Your_Energy/assets/vendor-CaULtfQf.js">
    <link rel="modulepreload" crossorigin href="/Your_Energy/assets/header-CveSMsZM.js">
    <link rel="stylesheet" crossorigin href="/Your_Energy/assets/vendor-CKZoNpAO.css">
    <link rel="stylesheet" crossorigin href="/Your_Energy/assets/header-DZLKbtdV.css">
    <link rel="stylesheet" crossorigin href="/Your_Energy/assets/favorites-BGgwAOn6.css">
  </head>

  <body>
    <header class="header">
  <div class="container header-container">
    <a href="./index.html" class="logo">YOUR ENERGY</a>

    <nav class="header-nav">
      <ul class="header-nav-list">
        <li>
          <a href="./index.html" class="header-nav-link">Home</a>
        </li>
        <li>
          <a href="./favorites.html" class="header-nav-link">Favorites</a>
        </li>
      </ul>
    </nav>

    <ul class="social-list">
      <li>
        <a
          href="https://www.facebook.com/goITclub/"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Facebook"
        >
          <svg width="24" height="24">
            <use href="./icons/sprite.svg#icon-facebook"></use>
          </svg>
        </a>
      </li>

      <li>
        <a
          href="https://www.instagram.com/goitclub/"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Instagram"
        >
          <svg width="24" height="24">
            <use href="./icons/sprite.svg#icon-instagram"></use>
          </svg>
        </a>
      </li>

      <li>
        <a
          href="https://www.youtube.com/c/GoIT"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="YouTube"
        >
          <svg width="24" height="24">
            <use href="./icons/sprite.svg#icon-youtube"></use>
          </svg>
        </a>
      </li>
    </ul>

    <button
      class="burger-btn"
      type="button"
      data-menu-open
      aria-label="Open menu"
    >
      ☰
    </button>
  </div>
</header>


    <div class="mobile-menu" data-mobile-menu>
  <button
    class="mobile-menu-close"
    type="button"
    data-menu-close
    aria-label="Close menu"
  >
    ×
  </button>

  <nav class="mobile-nav">
    <ul>
      <li>
        <a href="./index.html">Home</a>
      </li>
      <li>
        <a href="./favorites.html">Favorites</a>
      </li>
    </ul>
  </nav>

  <ul class="mobile-social-list">
    <li>...</li>
  </ul>
</div>

    <main>
      <section class="favorites section">
        <div class="container">
          <h1 class="favorites-title">Favorites</h1>

          <section class="quote favorites-quote">
            <h2 class="favorites-quote-title">Quote of the day</h2>
            <p class="favorites-quote-text" data-quote-text>Loading...</p>
            <p class="favorites-quote-author" data-quote-author></p>
          </section>

          <ul data-favorites-list></ul>

          <div
            class="favorites-empty is-hidden"
            data-empty-favorites
          >
            <p>
              It appears that you haven't added any
              exercises to your favorites yet.
            </p>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer">
  <div class="container footer-container">
    <a href="./index.html" class="footer-logo">YOUR ENERGY</a>

    <p class="footer-text">
      Transforming your body shape with us
    </p>

    <form class="subscription-form" data-subscription-form>
      <label>
        Subscribe and learn about new exercises!

        <input
          type="email"
          name="email"
          required
          pattern="^\w+(\.\w+)?@[a-zA-Z_]+?\.[a-zA-Z]{2,3}$"
          placeholder="Email"
        />
      </label>

      <button type="submit">Send</button>
    </form>
  </div>
</footer>


    <button
      type="button"
      data-scroll-up
      aria-label="Scroll to top"
    >
      ↑
    </button>

    <div data-loader class="loader is-hidden"></div>
    <div data-modal-root></div>

  </body>
</html>
