<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Your Energy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <load src="./partials/header.html" />
    <load src="./partials/mobile-menu.html" />

    <main>
      <!-- HERO -->
      <section class="hero section">
        <div class="container hero-container">
          <div class="hero-content">
            <h1 class="hero-title">
              Get Body in shape, Stay healthy
            </h1>

            <p class="hero-text">
              Transform your physique and embrace a healthier lifestyle.
            </p>

            <ul class="hero-tags">
              <li class="hero-tag">#Sport</li>
              <li class="hero-tag">#Healthy</li>
              <li class="hero-tag">#Workout</li>
              <li class="hero-tag">#Diet</li>
            </ul>
          </div>

          <div class="hero-image-wrapper">
            <img
              class="hero-image"
              src="./img/hero-mobile.jpg"
              alt="People doing exercise"
            />
          </div>
        </div>
      </section>

      <!-- EXERCISES -->
      <section class="exercises">
        <div class="container">
          <div class="exercises-top">
            <h2 class="exercises-title">
              Exercises
              <span class="selected-category" data-selected-category></span>
            </h2>

            <form
              class="search-form is-hidden"
              data-search-form
            >
              <input
                type="text"
                name="search"
                placeholder="Search"
              />
              <button type="submit">Search</button>
            </form>
          </div>

          <div class="filters" data-filters>
            <button
              type="button"
              data-filter="Muscles"
              class="is-active"
            >
              Muscles
            </button>

            <button
              type="button"
              data-filter="Body parts"
            >
              Body parts
            </button>
            <button
              type="button"
              data-filter="Equipment"
            >
              Equipment
            </button>
          </div>
          <ul data-categories-list></ul>
          <ul data-exercises-list></ul>
          <div data-pagination></div>
        </div>
      </section>

      <!-- QUOTE -->
      <section class="quote">
        <div class="container">
          <h2>Quote of the day</h2>
          <p data-quote-text>Loading...</p>
          <p data-quote-author></p>
        </div>
      </section>
      
    </main>

    <load src="./partials/footer.html" />

    <button
      class="scroll-up-btn"
      type="button"
      data-scroll-up
      aria-label="Scroll to top"
    >
      ↑
    </button>
    <div data-loader class="loader is-hidden"></div>
    <div data-modal-root></div>

    <script type="module" src="./main.js"></script>
  </body>
</html>
