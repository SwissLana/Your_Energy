<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Manage your favorite exercises in Your Energy and quickly access saved workouts anytime."
    />
    
    <title>Favorites | Your Energy</title>

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    
    <link rel="stylesheet" href="./css/styles.css" />
  </head>

  <body>
    <load src="./partials/header.html" />
    <load src="./partials/mobile-menu.html" />

    <main>
      <section class="favorites section">
        <div class="container">
          <h1 class="favorites-title">Favorites</h1>

          <div class="favorites-layout">
            <load src="./partials/favorites-qoute.html" />

            <div>

            
            <ul data-favorites-list></ul>

            <div
              class="favorites-empty is-hidden"
              data-empty-favorites
            >
              <p>
                It appears that you haven't added any
                exercises to your favorites yet. To get
                started, you can add exercises that you
                like to your favorites for easier access
                in the future.
              </p>
            </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <button
      class="scroll-up-btn"
      type="button"
      data-scroll-up
      aria-label="Scroll to top"
    >
      <svg class="scroll-up-btn-icon" width="32" height="32">
        <use href="./img/sprite.svg#icon-arrow-up"></use>
      </svg>
    </button>
    
    <div data-loader class="loader is-hidden"></div>

    <!-- modal windows -->
    <div data-modal-root></div>
    <load src="./partials/rating-modal.html" />

    <load src="./template/quote.html" />

    <script type="module" src="./favorites.js"></script>
  </body>
</html>
