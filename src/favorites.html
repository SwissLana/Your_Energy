<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Favorites | Your Energy</title>

  <link rel="icon" type="image/svg+xml" href="./favicon.svg" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./css/styles.css" />
</head>

<body>
  <load src="./partials/header.html" />
  <load src="./partials/mobile-menu.html" />

  <main>
    <section class="favorites section">
      <div class="container">
        <h1 class="favorites-title">Favorites</h1>

        <!-- todo fix style by figma -->
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
          <load src="./partials/quote.html" />

          <div>
            <ul data-favorites-list></ul>
            <div class="favorites-empty is-hidden" data-empty-favorites>
              <p>
                It appears that you haven't added any
                exercises to your favorites yet.
              </p>
            </div>
          </div>
        </div>

      </div>
    </section>
  </main>

  <load src="./partials/footer.html" />

  <button type="button" data-scroll-up aria-label="Scroll to top">
    ↑
  </button>

  <div data-loader class="loader is-hidden"></div>
  <div data-modal-root></div>

  <script type="module" src="./favorites.js"></script>
</body>

</html>
