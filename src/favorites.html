<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Favorites | Your Energy</title>

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/modern-normalize/3.0.1/modern-normalize.min.css"
    />
    <link rel="stylesheet" href="./css/styles.css" />
  </head>

  <body>
    <load src="./partials/header.html" />
    <load src="./partials/mobile-menu.html" />

    <main>
      <section class="favorites section">
        <div class="container">
          <h1 class="favorites-title">Favorites</h1>

          <div data-quote-card-root></div>

          <ul data-favorites-list></ul>

          <div class="favorites-empty is-hidden" data-empty-favorites>
            <p>
              It appears that you haven't added any
              exercises to your favorites yet. To get
              started, you can add exercises that you
              like to your favorites for easier access
              in the future.
            </p>
          </div>
        </div>
      </section>
    </main>

    <button type="button" data-scroll-up aria-label="Scroll to top">↑</button>

    <div data-loader class="loader is-hidden"></div>
    <div data-modal-root></div>

    <load src="./template/quote.html" />

    <script type="module" src="./favorites.js"></script>
  </body>
</html>
