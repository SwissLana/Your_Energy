<section class="exercises">
  <div class="container">
    <div class="exercises-top">
      <h2 class="exercises-title">
        Exercises
        <span class="selected-category" data-selected-category></span>
      </h2>

      <form class="search-form is-hidden" data-search-form>
        <input type="text" name="search" placeholder="Search" />
        <button type="submit">Search</button>
      </form>
    </div>

    <div class="exercises-content">
      <aside class="exercises-sidebar">
        <div class="quote-wrapper">

          <div data-quote-card-root></div>

          <div class="quote-image-wrapper">
            <picture>
              <source
                media="(min-width: 1440px)"
                srcset="
                  ./img/avif/desktop/women-drinking-water-dt.avif 1x,
                  ./img/avif/desktop/women-drinking-water-dt@2x.avif 2x
                "
                type="image/avif"
              />
              <source
                media="(min-width: 768px)"
                srcset="
                  ./img/avif/tablet/women-drinking-water-tablet.avif 1x,
                  ./img/avif/tablet/women-drinking-water-tablet@2x.avif 2x
                "
                type="image/avif"
              />
              <source
                srcset="
                  ./img/avif/mobile/women-drinking-water-mobile.avif 1x,
                  ./img/avif/mobile/women-drinking-water-mobile@2x.avif 2x
                "
                type="image/avif"
              />

              <source
                media="(min-width: 1440px)"
                srcset="
                  ./img/webp/desktop/women-drinking-water-dt.webp 1x,
                  ./img/webp/desktop/women-drinking-water-dt@2x.webp 2x
                "
                type="image/webp"
              />
              <source
                media="(min-width: 768px)"
                srcset="
                  ./img/webp/tablet/women-drinking-water-tablet.webp 1x,
                  ./img/webp/tablet/women-drinking-water-tablet@2x.webp 2x
                "
                type="image/webp"
              />
              <source
                srcset="
                  ./img/webp/mobile/women-drinking-water-mobile.webp 1x,
                  ./img/webp/mobile/women-drinking-water-mobile@2x.webp 2x
                "
                type="image/webp"
              />

              <img
                class="quote-image"
                src="./img/webp/mobile/women-drinking-water-mobile.webp"
                alt="Women drinking water after workout"
                loading="lazy"
              />
            </picture>
          </div>

          <div class="daily-card">
            <p class="daily-time">110 min</p>
            <h3 class="daily-title">Daily norm of sports</h3>
            <p class="daily-text">
              The World Health Organization recommends at least 150 minutes of
              moderate-intensity physical activity throughout the week for
              adults. Besides that, it has been proven that physical activity
              improves mental health, mood, and overall quality of life.
            </p>
          </div>
        </div>
      </aside>

      <div class="exercises-main">
        <div class="filters" data-filters>
          <button type="button" data-filter="Muscles" class="is-active">
            Muscles
          </button>

          <button type="button" data-filter="Body parts">Body parts</button>

          <button type="button" data-filter="Equipment">Equipment</button>
        </div>

        <ul data-categories-list></ul>
        <ul class="exercises-list" data-exercises-list></ul>
        <div data-pagination></div>
      </div>
    </div>
  </div>
</section>
