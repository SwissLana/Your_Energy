<div class="favorites-quote">
  <div data-quote-card-root style='width: 100%;'></div>
  <div class="favorites-quote-row">
    <div class="favorites-daily-card">
      <svg class="favorites-quote-icon" width="20" height="20" aria-hidden="true">
        <use href="./img/sprite.svg#icon-dumbbell"></use>
      </svg>
      <p class="daily-time">110 min</p>
      <h3 class="daily-title">Daily norm of sports</h3>
    </div>
    <div class="favorites-image-card">
      <picture>
        <source
          media="(min-width: 1440px)"
          type="image/avif"
          srcset="./img/avif/desktop/women-favorites-dt.avif 1x, ./img/avif/desktop/women-favorites-dt@2x.avif 2x"
        />
        <source
          media="(min-width: 768px)"
          type="image/avif"
          srcset="./img/avif/tablet/women-favorites-tablet.avif 1x, ./img/avif/tablet/women-favorites-tablet@2x.avif 2x"
        />
        <source
          type="image/avif"
          srcset="./img/avif/mobile/women-favorites-mobile.avif 1x, ./img/avif/mobile/women-favorites-mobile@2x.avif 2x"
        />

        <source
          media="(min-width: 1440px)"
          type="image/webp"
          srcset="./img/webp/desktop/women-favorites-dt.webp 1x, ./img/webp/desktop/women-favorites-dt@2x.webp 2x"
        />
        <source
          media="(min-width: 768px)"
          type="image/webp"
          srcset="./img/webp/tablet/women-favorites-tablet.webp 1x, ./img/webp/tablet/women-favorites-tablet@2x.webp 2x"
        />
        <source
          type="image/webp"
          srcset="./img/webp/mobile/women-favorites-mobile.webp 1x, ./img/webp/mobile/women-favorites-mobile@2x.webp 2x"
        />

        <img
          class="favorites-image"
          src="./img/jpg/mobile/women-favorites-mobile.jpg"
          alt="Favorite workout"
        />
      </picture>
    </div>
  </div>
</div>
