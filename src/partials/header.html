<header class="header">

    </a>

    <nav class="header-nav">
      <ul class="header-nav-list">
        <li class="header-nav-link">
          <a href="./index.html">Home</a>
        </li>
        <li class="header-nav-link">
          <a href="./favorites.html">Favorites</a>
        </li>
      </ul>
    </nav>

    <ul class="social-list">

          <svg width="24" height="24">
